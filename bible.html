        .active-mode { background-color: var(--primary); color: white; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }

            border: 1px solid #e2e8f0; 
            min-height: 65px; 
            padding: 6px; 
            font-size: 10px; 
            vertical-align: top; 
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 6px;
        }
        @media (max-width: 768px) {
            .calendar-table td { font-size: 9px; padding: 3px; }

            padding: 12px 18px; 
            border-radius: 12px; 
            font-weight: 800; 
            font-size: 0.9rem;
            margin: 16px 0 8px 0;

            justify-content: space-between;
            align-items: center;

        .part-header i { transition: transform 0.3s; }
        .part-header.collapsed i { transform: rotate(-90deg); }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        ];

        // --- 2. State Management (Master Data Model) ---
        let userState = {
            currentYear: '2026',
            currentSession: '1독',
            currentMode: 'mccheyne',
            years: ["2026", "2027", "2028"],
            sessions: ["1독", "2독"],
            masterRead: {},
            memos: {},
            collapsedParts: { mccheyne: {}, sequential: {} }
        };

        let schedules = { mccheyne: [], sequential: [] };
        let currentTab = 'plan';
        let isDarkMode = false;

        // --- 3. Logic: Data Initialization ---

        function parseBibleString(raw) {
            let chaps = [];
            raw.split(',').forEach(part => {
                part = part.trim();
                let match = part.match(/^(.+?)\s?(\d+)(-(\d+))?$/);
                if (match) {
                    let bookName = match[1];
                    let start = parseInt(match[2]);
                    let end = match[4] ? parseInt(match[4]) : start;
                    for (let i = start; i <= end; i++) chaps.push(`${bookName} ${i}`);
                }
            });
            return chaps;
        }

        function initSchedules() {
            // 1. Sequential Generator
            let allSequential = [];
            bibleBooksData.forEach(b => {
                for (let i = 1; i <= b.c; i++) allSequential.push(`${b.n} ${i}`);
            });
            for (let i = 0; i < allSequential.length; i += 5) {
                let dayIdx = i / 5;
                let date = new Date(2026, 0, dayIdx + 1);
                schedules.sequential.push({
                    id: dayIdx, month: date.getMonth() + 1, day: date.getDate(),
                    chapters: allSequential.slice(i, i + 5)
                });
            }

            // 2. McCheyne Generator
            let allMc = [];
            mcRawData.forEach(raw => allMc.push(...parseBibleString(raw)));
            for (let i = 0; i < allMc.length; i += 5) {
                let dayIdx = i / 5;
                let date = new Date(2026, 0, dayIdx + 1);
                const part = mcPartConfig.find(p => p.startIdx === dayIdx);
                schedules.mccheyne.push({
                    id: dayIdx, month: date.getMonth() + 1, day: date.getDate(),
                    chapters: allMc.slice(i, i + 5),
                    partTitle: part ? part.title : null
                });
            }
        }

        function initDataPath(year, session) {
            if (!userState.masterRead[year]) userState.masterRead[year] = {};
            if (!userState.masterRead[year][session]) userState.masterRead[year][session] = {};
            if (!userState.memos[year]) userState.memos[year] = {};
            if (!userState.memos[year][session]) userState.memos[year][session] = {};
            
            if (Object.keys(userState.collapsedParts.mccheyne).length === 0) {
                mcPartConfig.forEach(p => userState.collapsedParts.mccheyne[p.title] = true);
            }
        }

        function loadLocalStorage() {
            const saved = localStorage.getItem('bible_master_sync_v7');
            if (saved) userState = {...userState, ...JSON.parse(saved)};
            initDataPath(userState.currentYear, userState.currentSession);
        }

        function saveLocalStorage() {
            // 로컬 스토리지에 백업 (오프라인 캐시 역할)
            localStorage.setItem('bible_master_sync_v7', JSON.stringify(userState));
            
            // Firebase 실시간 서버에 동기화
            if (window.setDoc && window.doc && window.db) {
                const docRef = window.doc(window.db, 'bibleApp', 'userState_v7');
                window.setDoc(docRef, userState).catch(err => {
                    console.error("Firebase 저장 에러:", err);
                });
            }
        }

        let isInitialLoadDone = false;
        
        window.initFirebaseSync = function() {
            if (!window.db) return;
            const docRef = window.doc(window.db, 'bibleApp', 'userState_v7');
            
            // Firebase 실시간 리스너 작동
            window.onSnapshot(docRef, (snapshot) => {
                if (snapshot.exists()) {
                    const serverData = snapshot.data();
                    if (serverData) {
                        userState = {...userState, ...serverData};
                        initDataPath(userState.currentYear, userState.currentSession);
                        
                        // 서버 데이터를 로컬 스토리지에 백업
                        localStorage.setItem('bible_master_sync_v7', JSON.stringify(userState));
                        
                        // 초기 로딩 이후 외부에서 데이터가 변경된 경우 즉시 UI 갱신 (실시간 연동)
                        if (isInitialLoadDone) {
                            renderSelectors();
                            renderUI();
                            updateToday();
                        }
                    }
                } else {
                    // 서버에 데이터가 아예 없다면 기존 로컬 데이터를 서버로 최초 1회 업로드
                    saveLocalStorage();
                }
            }, (error) => {
                console.error("Firebase 연동 에러:", error);
            });
        };

        // --- 4. Core Interaction ---

        function toggleCheck(dayId) {
            const year = userState.currentYear;
            const session = userState.currentSession;
            const mode = userState.currentMode;
            const dayData = schedules[mode].find(s => s.id === dayId);
            if (!dayData) return;

            const readStore = userState.masterRead[year][session];
            // Check if all chapters in this set are already read
            const isAllRead = dayData.chapters.every(c => readStore[c]);
            
            // Toggle all chapters in this group
            dayData.chapters.forEach(c => {
                readStore[c] = !isAllRead;
            });

            saveLocalStorage();
            renderUI();
        }

        function isDayChecked(dayData) {
            const readStore = userState.masterRead[userState.currentYear][userState.currentSession];
            return dayData.chapters.length > 0 && dayData.chapters.every(c => readStore[c]);
        }

        // --- 5. Accordion Logic ---

        function togglePart(partTitle) {
            const mode = userState.currentMode;
            userState.collapsedParts[mode][partTitle] = !userState.collapsedParts[mode][partTitle];
            saveLocalStorage();
            renderList();
        }

        function toggleAllParts(isOpen) {
            const mode = userState.currentMode;
            if (mode === 'mccheyne') {
                mcPartConfig.forEach(p => userState.collapsedParts.mccheyne[p.title] = isOpen);
            }
            saveLocalStorage();
            renderList();
        }

        // --- 6. UI Rendering ---

        function renderSelectors() {
            const yearSel = document.getElementById('year-selector');
            yearSel.innerHTML = userState.years.map(y => `<option value="${y}" ${y === userState.currentYear ? 'selected' : ''}>${y}년</option>`).join('');
            
            const sessSel = document.getElementById('session-selector');
            sessSel.innerHTML = userState.sessions.map(s => `<option value="${s}" ${s === userState.currentSession ? 'selected' : ''}>${s}</option>`).join('');
        }

        function addYear() {
            const year = prompt("추가할 연도(4자리):");
            if (year && /^\d{4}$/.test(year) && !userState.years.includes(year)) {
                userState.years.push(year);
                userState.years.sort();
                userState.currentYear = year;
                initDataPath(year, userState.currentSession);
                saveLocalStorage();
                renderSelectors();
                renderUI();
            }
        }

        function addSession() {
            const sess = prompt("추가할 독차(예: 3독, 특별회독):");
            if (sess && !userState.sessions.includes(sess)) {
                userState.sessions.push(sess);
                userState.currentSession = sess;
                initDataPath(userState.currentYear, sess);
                saveLocalStorage();
                renderSelectors();
                renderUI();
            }
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.className = isDarkMode ? 'dark' : 'light';
            document.getElementById('theme-icon').className = isDarkMode ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }

        function switchMode(mode) {
            userState.currentMode = mode;
            document.getElementById('mode-mccheyne').className = mode === 'mccheyne' ? 'px-6 py-2 rounded-lg text-sm font-bold active-mode' : 'px-6 py-2 rounded-lg text-sm font-bold text-slate-500 hover:text-indigo-500';
            document.getElementById('mode-sequential').className = mode === 'sequential' ? 'px-6 py-2 rounded-lg text-sm font-bold active-mode' : 'px-6 py-2 rounded-lg text-sm font-bold text-slate-500 hover:text-indigo-500';
            document.getElementById('current-mode-label').innerText = mode === 'mccheyne' ? '한국형 맥체인' : '성경 순서대로';
            renderUI();
            updateToday();
            saveLocalStorage();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.remove('active-tab', 'text-slate-500'));
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('active-tab');
            renderUI();
        }

        function renderList() {
            const list = document.getElementById('reading-list');
            const schedule = schedules[userState.currentMode];
            const memoStore = userState.memos[userState.currentYear][userState.currentSession];
            const mode = userState.currentMode;
            
            let html = "";
            let currentPartOpen = true;

            schedule.slice(0, 366).forEach(day => {
                // Header check (McCheyne specific for Accordion)
                if (mode === 'mccheyne' && day.partTitle) {
                    currentPartOpen = userState.collapsedParts[mode][day.partTitle];
                    html += `
                        <div class="part-header ${!currentPartOpen ? 'collapsed' : ''}" onclick="togglePart('${day.partTitle}')">
                            <span>${day.partTitle}</span>
                            <i class="fa-solid fa-chevron-down"></i>
                        </div>
                    `;
                }

                if (currentPartOpen || mode === 'sequential') {
                    const checked = isDayChecked(day);
                    html += `
                        <div class="glass-card p-4 flex items-center justify-between gap-4 transition-all hover:scale-[1.005] ${checked ? 'opacity-40' : ''}">
                            <div class="flex items-center gap-4">
                                <div onclick="toggleCheck(${day.id})" class="w-8 h-8 rounded-full border-2 flex items-center justify-center cursor-pointer transition-all ${checked ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-slate-300 dark:border-slate-600'}">
                                    <i class="fa-solid fa-check text-xs"></i>
                                </div>
                                <div>
                                    <p class="text-[10px] opacity-50 font-bold">${day.month}월 ${day.day}일</p>
                                    <p class="font-bold text-sm leading-tight">${day.chapters.join(', ')}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <button onclick="openMemo(${day.id})" class="text-xl ${memoStore[day.id + '_' + mode] ? 'text-amber-500' : 'opacity-20 hover:opacity-100 hover:text-indigo-500'}">
                                    <i class="fa-solid fa-note-sticky"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }
            });

            list.innerHTML = html;
        }

        function renderCalendar() {
            const header = document.getElementById('calendar-header');
            const body = document.getElementById('calendar-body');
            const schedule = schedules[userState.currentMode];
            
            header.innerHTML = Array.from({length: 12}, (_, i) => `<th>${i+1}월</th>`).join('');
            
            let rows = "";
            for(let d=1; d<=31; d++) {
                rows += "<tr>";
                for(let m=1; m<=12; m++) {
                    const dayData = schedule.find(s => s.month === m && s.day === d);
                    if(!dayData) {
                        rows += `<td class="bg-slate-50 dark:bg-slate-950/30 opacity-10"></td>`;
                    } else {
                        const checked = isDayChecked(dayData);
                        const links = dayData.chapters.map(c => `<span onclick="event.stopPropagation(); window.open('https://search.naver.com/search.naver?query=${encodeURIComponent(c)}+성경')" class="hover:text-indigo-500 hover:underline block truncate leading-tight cursor-pointer">${c}</span>`).join('');
                        rows += `
                            <td onclick="toggleCheck(${dayData.id})" class="${checked ? 'td-checked' : ''}">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="font-black opacity-20 text-[9px]">${d}</span>
                                    ${checked ? '<i class="fa-solid fa-check text-indigo-500 text-[9px]"></i>' : ''}
                                </div>
                                <div class="space-y-0.5">${links}</div>
                            </td>
                        `;
                    }
                }
                rows += "</tr>";
            }
            body.innerHTML = rows;
        }

        function renderMemoList() {
            const container = document.getElementById('memo-list');
            const memoStore = userState.memos[userState.currentYear][userState.currentSession];
            const keys = Object.keys(memoStore).sort((a,b) => b-a);
            
            if(keys.length === 0) {
                container.innerHTML = `<div class="text-center py-24 opacity-30"><p>기록된 메모가 없습니다.</p></div>`;
                return;
            }

            container.innerHTML = keys.map(key => {
                const [id, mode] = key.split('_');
                const day = schedules[mode].find(s => s.id == id);
                return `
                    <div class="glass-card p-6 relative group border border-transparent hover:border-indigo-100 transition-all">
                        <div class="flex justify-between mb-2">
                            <span class="text-xs text-indigo-500 font-bold uppercase">${mode === 'mccheyne' ? '맥체인' : '순서'} | ${day.month}월 ${day.day}일 · ${day.chapters.join(', ')}</span>
                            <button onclick="deleteMemo('${key}')" class="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600 transition-all"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                        <p class="whitespace-pre-wrap text-sm leading-relaxed text-slate-600 dark:text-slate-300">${memoStore[key]}</p>
                    </div>
                `;
            }).join('');
        }

        function renderHistory() {
            const container = document.getElementById('yearly-summary');
            const totalChapters = 1189;
            
            container.innerHTML = userState.sessions.map(s => {
                const year = userState.currentYear;
                initDataPath(year, s);
                const readStore = userState.masterRead[year][s];
                const readCount = Object.values(readStore).filter(v => v).length;
                const percent = Math.round((readCount / totalChapters) * 100);
                const isCurrent = (s === userState.currentSession);
                
                return `
                    <div class="glass-card p-6 flex flex-col gap-3 ${isCurrent ? 'ring-2 ring-indigo-500' : ''}">
                        <div class="flex justify-between items-end">
                            <span class="text-xl font-black">${year}년 ${s}</span>
                            <span class="text-lg font-bold text-indigo-500">${percent}%</span>
                        </div>
                        <div class="w-full bg-slate-200 dark:bg-slate-700 h-2.5 rounded-full overflow-hidden">
                            <div class="bg-indigo-500 h-full transition-all duration-1000" style="width: ${percent}%"></div>
                        </div>
                        <div class="flex justify-between text-[11px] opacity-40 font-bold">
                            <span>누적 읽기</span>
                            <span>${readCount} / ${totalChapters} 장 완료</span>
                            <button onclick="userState.currentSession='${s}'; renderUI(); renderSelectors();" class="text-indigo-600 hover:underline">선택</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
            const year = userState.currentYear;
            const session = userState.currentSession;
            const readStore = userState.masterRead[year][session];
            const memoStore = userState.memos[year][session];
            const totalChapters = 1189;
            const readCount = Object.values(readStore).filter(v => v).length;
            const percent = Math.round((readCount / totalChapters) * 100);
            
            document.getElementById('stat-progress').innerText = `${percent}%`;
            document.getElementById('stat-memo').innerText = `${Object.keys(memoStore).length}개`;
            
            const circle = document.getElementById('progress-circle');
            circle.style.strokeDashoffset = 150.8 - (percent / 100 * 150.8);
        }

        function updateToday() {
            const now = new Date();
            const schedule = schedules[userState.currentMode];
            const today = schedule.find(s => s.month === (now.getMonth()+1) && s.day === now.getDate());
            const container = document.getElementById('today-assignment');
            
            if(today) {
                container.innerHTML = today.chapters.map(c => `
                    <button onclick="window.open('https://search.naver.com/search.naver?query=${encodeURIComponent(c)}+성경')" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-xs font-bold shadow-lg hover:bg-indigo-700 hover:scale-105 transition-all">
                        ${c} <i class="fa-solid fa-search ml-1 text-[8px]"></i>
                    </button>
                `).join('');
            }
        }

        function renderUI() {
            if(currentTab === 'plan') renderList();
            if(currentTab === 'calendar') renderCalendar();
            if(currentTab === 'memo') renderMemoList();
            if(currentTab === 'history') renderHistory();
            updateStats();
        }

        let selectedMemoKey = null;
        function openMemo(dayId) {
            selectedMemoKey = dayId + "_" + userState.currentMode;
            const day = schedules[userState.currentMode].find(s => s.id == dayId);
            document.getElementById('modal-subtitle').innerText = `${day.month}월 ${day.day}일 · ${day.chapters.join(', ')}`;
            const memoStore = userState.memos[userState.currentYear][userState.currentSession];
            document.getElementById('memo-input').value = memoStore[selectedMemoKey] || "";
            document.getElementById('memo-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('memo-modal').classList.add('hidden'); }
        function saveMemo() {
            const val = document.getElementById('memo-input').value.trim();
            const memoStore = userState.memos[userState.currentYear][userState.currentSession];
            if(val) memoStore[selectedMemoKey] = val;
            else delete memoStore[selectedMemoKey];
            saveLocalStorage();
            renderUI();
            closeModal();
        }
        function deleteMemo(key) {
            if(confirm("기록을 삭제하시겠습니까?")) {
                delete userState.memos[userState.currentYear][userState.currentSession][key];
                saveLocalStorage();
                renderUI();
            }
        }

        function backupData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(userState));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", `성경읽기_마스터백업_${new Date().toLocaleDateString()}.json`);
            dl.click();
        }

        window.onload = function() {
            initSchedules();
            loadLocalStorage(); // 오프라인에서도 즉시 작동하도록 로컬 데이터를 먼저 렌더링
            renderSelectors();
            renderUI();
            updateToday();
            isInitialLoadDone = true;
            
            // Firebase 모듈이 먼저 로드된 경우를 대비한 실행
            if (window.db && window.initFirebaseSync) {
                window.initFirebaseSync();
            }
        };

    </script>
</body>
</html>
